<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mural Radio Cotia - Teste</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
    <style>
        body { font-family: 'Open Sans', sans-serif; background: transparent; margin: 0; padding: 0; }
        
        .secao-titulo { 
            font-size: 18px; 
            font-weight: 800; 
            color: #004a99; 
            margin: 20px 0 10px 10px; 
            text-transform: uppercase;
        }
        /* Cor diferente apenas para o título de Destaques */
        .titulo-destaques { color: #b8860b; }

        .swiper { width: 100%; padding-bottom: 30px; }
        .swiper-slide { width: 180px; padding: 5px; }
        .card { 
            background: #fff; 
            border-radius: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
            overflow: hidden; 
            cursor: pointer; 
        }
        .foto { width: 100%; height: 110px; object-fit: cover; display: block; }
        .info { padding: 8px; }
        .titulo-post { font-size: 12px; font-weight: bold; color: #333; margin: 0; height: 32px; overflow: hidden; }
    </style>
</head>
<body>

    <div class="secao-titulo">📰 Notícias 24 Horas</div>
    <div class="swiper mySwiper">
        <div class="swiper-wrapper" id="lista-24h"></div>
        <div class="swiper-pagination"></div>
    </div>

    <div class="secao-titulo titulo-destaques">✨ Destaques</div>
    <div class="swiper mySwiperDestaques">
        <div class="swiper-wrapper" id="lista-destaques"></div>
        <div class="swiper-pagination"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>

<script>
    // Seus links
    const LINK_24H = "https://script.google.com/macros/s/AKfycbzvxO4A4LuJPluxrGANlxSWTWHN3ZxU2UgcveW-3wZaIAUS_xLYrCd1LcGbpjMoc6Wa/exec"; 
    const LINK_DESTAQUES = "https://script.google.com/macros/s/AKfycbwY0_wrO28yeXPNqNF0PbAxswS1o6WkOaZzbOjnIJhK0uJAe2aKpbTcYVLoaU8VD9tGBw/exec?aba=Destaques";

    async function carregarTudo() {
        const agora = new Date().getTime();

        // 1. CARREGA 24H (Exatamente como o seu faz hoje)
        try {
            const res24 = await fetch(LINK_24H);
            const dados24 = JSON.parse(await res24.text());
            const lista24 = document.getElementById('lista-24h');
            
            // Filtro de 24 horas
            const recentes = dados24.filter(item => (agora - new Date(item.data).getTime()) < (24 * 60 * 60 * 1000));
            
            recentes.forEach(item => {
                lista24.innerHTML += criarSlide(item);
            });
        } catch (e) { console.error("Erro no 24h"); }

        // 2. CARREGA DESTAQUES (Filtro de 7 dias)
        try {
            const resD = await fetch(LINK_DESTAQUES);
            const dadosD = JSON.parse(await resD.text());
            const listaD = document.getElementById('lista-destaques');
            
            // Filtro de 7 dias
            const destaquesValidos = dadosD.filter(item => (agora - new Date(item.data).getTime()) < (7 * 24 * 60 * 60 * 1000));
            
            destaquesValidos.forEach(item => {
                listaD.innerHTML += criarSlide(item);
            });
        } catch (e) { console.error("Erro nos Destaques"); }

        // Inicia os carrosséis
        new Swiper(".mySwiper", { slidesPerView: "auto", spaceBetween: 10, pagination: { el: ".swiper-pagination", clickable: true } });
        new Swiper(".mySwiperDestaques", { slidesPerView: "auto", spaceBetween: 10, pagination: { el: ".swiper-pagination", clickable: true } });
    }

    function criarSlide(item) {
        return `
            <div class="swiper-slide">
                <div class="card" onclick="window.open('${item.link}', '_blank')">
                    <img src="${item.link}" class="foto" onerror="this.src='https://via.placeholder.com/150?text=IMAGEM'">
                    <div class="info">
                        <p class="titulo-post">${item.titulo}</p>
                    </div>
                </div>
            </div>`;
    }

    carregarTudo();
</script>

</body>
</html>
