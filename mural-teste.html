<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mural de Exibição - Teste</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #ffffff; margin: 0; padding: 10px; color: #333; }
        
        h2 { font-size: 18px; color: #004a99; border-left: 5px solid #004a99; padding-left: 10px; margin: 20px 0 10px; text-transform: uppercase; letter-spacing: 1px; }
        .titulo-destaques { color: #b8860b; border-left-color: #b8860b; margin-top: 40px; }
        
        .aviso-tempo { font-size: 11px; color: #888; margin-bottom: 15px; margin-left: 15px; font-style: italic; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .card { background: #fff; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); overflow: hidden; cursor: pointer; transition: 0.3s; position: relative; border: 1px solid #eee; }
        .card:hover { transform: translateY(-3px); box-shadow: 0 6px 15px rgba(0,0,0,0.12); }
        
        .foto { width: 100%; height: 130px; object-fit: cover; display: block; background: #f0f0f0; }
        .info { padding: 10px; }
        .titulo-post { font-size: 13px; font-weight: bold; color: #222; margin: 0; line-height: 1.3; height: 34px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .tipo-badge { font-size: 9px; background: rgba(0,0,0,0.7); color: #fff; padding: 3px 6px; border-radius: 4px; position: absolute; top: 8px; right: 8px; font-weight: bold; }
        
        .vazio { font-size: 13px; color: #999; padding: 15px; }
    </style>
</head>
<body>

    <h2>📰 Notícias 24 Horas</h2>
    <p class="aviso-tempo">Exibindo postagens das últimas 24h</p>
    <div id="lista-24h" class="grid"><p class="vazio">Buscando notícias...</p></div>

    <h2 class="titulo-destaques">✨ Destaques</h2>
    <p class="aviso-tempo">Exibindo postagens dos últimos 7 dias</p>
    <div id="lista-destaques" class="grid"><p class="vazio">Buscando destaques...</p></div>

<script>
    const LINK_24H = "https://script.google.com/macros/s/AKfycbzvxO4A4LuJPluxrGANlxSWTWHN3ZxU2UgcveW-3wZaIAUS_xLYrCd1LcGbpjMoc6Wa/exec"; 
    const LINK_DESTAQUES = "https://script.google.com/macros/s/AKfycbwY0_wrO28yeXPNqNF0PbAxswS1o6WkOaZzbOjnIJhK0uJAe2aKpbTcYVLoaU8VD9tGBw/exec?aba=Destaques";

    async function carregarDados() {
        const agora = new Date().getTime();
        const umDiaMs = 24 * 60 * 60 * 1000;
        const seteDiasMs = 7 * umDiaMs;

        // --- NOTÍCIAS 24H ---
        try {
            const res24 = await fetch(LINK_24H);
            const dados24 = JSON.parse(await res24.text());
            const container24 = document.getElementById('lista-24h');
            
            const recentes = dados24.filter(item => (agora - new Date(item.data).getTime()) < umDiaMs);
            
            container24.innerHTML = recentes.length ? "" : "<p class='vazio'>Nenhuma notícia recente.</p>";
            recentes.forEach(item => container24.appendChild(criarCard(item)));
        } catch (e) { console.error(e); }

        // --- DESTAQUES (7 DIAS) ---
        try {
            const resD = await fetch(LINK_DESTAQUES);
            const dadosD = JSON.parse(await resD.text());
            const containerD = document.getElementById('lista-destaques');
            
            // Filtra para mostrar apenas o que tem menos de 7 dias
            const destaquesValidos = dadosD.filter(item => (agora - new Date(item.data).getTime()) < seteDiasMs);
            
            containerD.innerHTML = destaquesValidos.length ? "" : "<p class='vazio'>Nenhum destaque nos últimos 7 dias.</p>";
            destaquesValidos.forEach(item => containerD.appendChild(criarCard(item)));
        } catch (e) { console.error(e); }
    }

    function criarCard(item) {
        const div = document.createElement('div');
        div.className = 'card';
        div.onclick = () => window.open(item.link, '_blank');
        div.innerHTML = `
            <span class="tipo-badge">${item.tipo}</span>
            <img src="${item.link}" class="foto" onerror="this.src='https://via.placeholder.com/150?text=RADIO'">
            <div class="info"><p class="titulo-post">${item.titulo}</p></div>
        `;
        return div;
    }

    carregarDados();
</script>

</body>
</html>
