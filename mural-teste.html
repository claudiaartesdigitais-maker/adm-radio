<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mural de Notícias</title>
    <style>
        body, html { margin: 0; padding: 0; background: #ffffff; font-family: 'Segoe UI', Roboto, sans-serif; overflow-x: hidden; }
        .mural-titulo { padding: 15px 18px 8px 18px; font-size: 22px; font-weight: 900; color: #001a33; text-transform: uppercase; display: flex; align-items: center; gap: 10px; }
        .mural-titulo::before { content: ''; width: 5px; height: 22px; background: #d32f2f; border-radius: 2px; }
        
        .titulo-destaque::before { background: #b8860b; }
        .titulo-destaque { color: #b8860b; }

        .feed-container { display: flex; flex-direction: row; overflow-x: auto; padding: 10px 15px 35px 15px; gap: 18px; -webkit-overflow-scrolling: touch; }
        .feed-container::-webkit-scrollbar { display: none; }
        
        .card { flex: 0 0 300px; background: white; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.12); text-decoration: none; color: #333; height: 400px; display: flex; flex-direction: column; border: 1px solid #eee; overflow: hidden; position: relative; }
        
        .thumb-container { width: 100%; height: 200px; background: #000; overflow: hidden; position: relative; }
        .thumb { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        /* Ícone de Play para Vídeos */
        .play-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.6); border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; pointer-events: none; }

        .corpo { padding: 15px; flex: 1; display: flex; flex-direction: column; justify-content: flex-start; }
        .tipo { font-size: 12px; color: #d32f2f; font-weight: 900; text-transform: uppercase; margin-bottom: 8px; }
        .tipo-destaque { color: #b8860b; }
        .titulo { font-size: 18px; font-weight: bold; line-height: 1.4; color: #001a33; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body>

    <div class="mural-titulo">Notícias 24 horas</div>
    <div id="lista" class="feed-container">Carregando notícias...</div>

    <hr style="border:0; border-top:1px solid #eee; margin: 10px 0;">

    <div class="mural-titulo titulo-destaque">Destaques da Semana</div>
    <div id="lista-destaques" class="feed-container">Carregando destaques...</div>

    <script>
        // Link do seu Web App (Apps Script) que você gerou por último
        const URL_API = "https://script.google.com/macros/s/AKfycbxNzDvifH0pv74i5E7BUS-scdfujI7mRLymYcOmCJDN3JH4AeGAThfHZoGDt2xS228zWw/exec";
        const imgMuralPadrao = "https://raw.githubusercontent.com/claudiaartesdigitais-maker/adm-radio/main/mural.png";

        async function carregarDados() {
            try {
                // Carrega Notícias (aba padrão ou configurada no script)
                const resNoticias = await fetch(URL_API);
                const dadosNoticias = await resNoticias.json();
                document.getElementById('lista').innerHTML = renderizarCards(dadosNoticias, false, 1);

                // Carrega Destaques (especificando a aba no link)
                const resDestaques = await fetch(URL_API + "?aba=Respostas ao formulário 1");
                const dadosDestaques = await resDestaques.json();
                document.getElementById('lista-destaques').innerHTML = renderizarCards(dadosDestaques, true, 7);

            } catch (e) {
                console.error("Erro ao carregar dados:", e);
                document.getElementById('lista').innerHTML = "Erro ao carregar postagens.";
            }
        }

        function renderizarCards(lista, isDestaque, diasFiltro) {
            const agora = new Date().getTime();
            const limiteMs = diasFiltro * 24 * 60 * 60 * 1000;

            // Filtra por data (apenas postagens recentes)
            const filtradas = lista.filter(item => {
                if(!item.data) return false;
                return (agora - new Date(item.data).getTime()) < limiteMs;
            });

            if (filtradas.length === 0) {
                return "<p style='padding:40px; color:#999; text-align:center; width:100%;'>Nenhuma postagem recente encontrada.</p>";
            }

            return filtradas.map(item => {
                const linkOriginal = (item.link || "").trim();
                const tipoConteudo = (item.tipo || "IMAGE").toUpperCase();
                
                let htmlMidia;
                
                // Se for VIDEO, tentamos mostrar uma prévia ou ícone
                if (tipoConteudo === "VIDEO") {
                    htmlMidia = `
                        <div class="thumb-container">
                            <div class="play-icon">▶</div>
                            <img src="${imgMuralPadrao}" class="thumb" style="opacity: 0.5;">
                        </div>`;
                } else {
                    // Se for imagem, usa o link processado da coluna E
                    htmlMidia = `
                        <div class="thumb-container">
                            <img src="${item.link}" class="thumb" onerror="this.src='${imgMuralPadrao}'">
                        </div>`;
                }

                const badgeCor = isDestaque ? 'tipo-destaque' : '';
                const icone = isDestaque ? '✨' : '⌚';

                return `
                    <a href="${linkOriginal}" target="_blank" class="card">
                        ${htmlMidia}
                        <div class="corpo">
                            <span class="tipo ${badgeCor}">${icone} ${item.apresentador || tipoConteudo}</span>
                            <div class="titulo">${item.titulo || "Sem título"}</div>
                        </div>
                    </a>`;
            }).join('');
        }

        // Inicia o carregamento
        carregarDados();
    </script>
</body>
</html>
