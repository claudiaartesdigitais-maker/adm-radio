<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html { margin: 0; padding: 0; background: #ffffff; font-family: 'Segoe UI', Roboto, sans-serif; overflow-x: hidden; }
        .mural-titulo { padding: 15px 18px 8px 18px; font-size: 22px; font-weight: 900; color: #001a33; text-transform: uppercase; display: flex; align-items: center; gap: 10px; }
        .mural-titulo::before { content: ''; width: 5px; height: 22px; background: #d32f2f; border-radius: 2px; }
        
        .titulo-destaque::before { background: #b8860b; }
        .titulo-destaque { color: #b8860b; }

        .feed-container { display: flex; flex-direction: row; overflow-x: auto; padding: 10px 15px 35px 15px; gap: 18px; -webkit-overflow-scrolling: touch; }
        .feed-container::-webkit-scrollbar { display: none; }
        .card { flex: 0 0 300px; background: white; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.12); text-decoration: none; color: #333; height: 400px; display: flex; flex-direction: column; border: 1px solid #eee; overflow: hidden; }
        .thumb-container { width: 100%; height: 200px; background: #000; overflow: hidden; }
        .thumb { width: 100%; height: 100%; object-fit: cover; display: block; }
        .corpo { padding: 15px; flex: 1; display: flex; flex-direction: column; justify-content: flex-start; }
        .tipo { font-size: 12px; color: #d32f2f; font-weight: 900; text-transform: uppercase; margin-bottom: 8px; }
        .tipo-destaque { color: #b8860b; }
        .titulo { font-size: 18px; font-weight: bold; line-height: 1.4; color: #001a33; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body>
    <div class="mural-titulo">Notícias 24 horas</div>
    <div id="lista" class="feed-container"></div>

    <hr style="border:0; border-top:1px solid #eee; margin: 10px 0;">

    <div class="mural-titulo titulo-destaque">Destaques da Semana</div>
    <div id="lista-destaques" class="feed-container"></div>

    <script>
        const imgMuralPadrao = "https://raw.githubusercontent.com/claudiaartesdigitais-maker/adm-radio/main/mural.png?t=" + new Date().getTime();

        // 1. NOTÍCIAS 24 HORAS (Link original mantido)
        async function carregarNoticias() {
            const url = "https://script.google.com/macros/s/AKfycbzvxO4A4LuJPluxrGANlxSWTWHN3ZxU2UgcveW-3wZaIAUS_xLYrCd1LcGbpjMoc6Wa/exec";
            try {
                const res = await fetch(url);
                const dados = await res.json(); 
                document.getElementById('lista').innerHTML = renderizarCards(dados, false, 1); 
            } catch (e) { console.error(e); }
        }

        // 2. DESTAQUES DA SEMANA (Link atualizado para a aba correta)
        async function carregarDestaques() {
            const urlDestaques = "https://script.google.com/macros/s/AKfycbxNzDvifH0pv74i5E7BUS-scdfujI7mRLymYcOmCJDN3JH4AeGAThfHZoGDt2xS228zWw/exec?aba=Respostas ao formulário 1";
            try {
                const res = await fetch(urlDestaques);
                const dados = await res.json(); 
                document.getElementById('lista-destaques').innerHTML = renderizarCards(dados, true, 7); 
            } catch (e) { console.error(e); }
        }

        function renderizarCards(lista, isDestaque, diasFiltro) {
            const agora = new Date().getTime();
            const limiteMs = diasFiltro * 24 * 60 * 60 * 1000;

            const filtradas = lista.filter(item => {
                if(!item.data) return false;
                return (agora - new Date(item.data).getTime()) < limiteMs;
            });

            if (filtradas.length === 0) return "<p style='padding:50px; color:#999; text-align:center; width:100%; font-size:16px;'>Sem postagens recentes.</p>";

            return filtradas.reverse().map(item => {
                const linkOriginal = (item.link || "").trim();
                const linkLower = linkOriginal.toLowerCase();
                const ytMatch = linkOriginal.match(/(?:youtu\.be\/|v\/|u\/\w\/|embed\/|shorts\/|live\/|watch\?v=|\&v=)([^#\&\?]*).*/);
                const ytId = ytMatch ? ytMatch[1] : null;
                
                let imgFinal;

                if (linkOriginal.includes("drive.google.com")) {
                    imgFinal = linkOriginal; 
                } 
                else if (linkLower.includes("facebook") || linkLower.includes("fb.watch") || linkLower.includes("instagram") || linkLower.includes("tiktok")) {
                    imgFinal = imgMuralPadrao;
                } else if (ytId) {
                    imgFinal = `https://img.youtube.com/vi/${ytId}/hqdefault.jpg`;
                } else if (item.capa && item.capa.length > 15) {
                    imgFinal = item.capa;
                } else {
                    imgFinal = imgMuralPadrao;
                }
                
                const badgeCor = isDestaque ? 'tipo-destaque' : '';
                const icone = isDestaque ? '✨' : '⌚';

                return `
                    <a href="${linkOriginal}" target="_blank" class="card">
                        <div class="thumb-container">
                            <img src="${imgFinal}" class="thumb" onerror="this.src='${imgMuralPadrao}'">
                        </div>
                        <div class="corpo">
                            <span class="tipo ${badgeCor}">${icone} ${(item.tipo || 'Postagem')}</span>
                            <div class="titulo">${item.titulo}</div>
                        </div>
                    </a>`;
            }).join('');
        }

        carregarNoticias();
        carregarDestaques();
    </script>
</body>
</html>
