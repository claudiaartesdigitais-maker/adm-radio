<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destaques da Rádio</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #ffffff; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        .header-faixa { width: 100%; background-color: #001f3f; color: #ffffff; padding: 12px 0; text-align: center; font-weight: bold; font-size: 1.1rem; text-transform: uppercase; }
        .swiper { width: 100%; padding: 20px 0 50px 0; }
        .swiper-slide { width: 85%; display: flex; flex-direction: column; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #eee; }
        .media-container { width: 100%; height: 280px; background: #000; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        .media-container img { width: 100%; height: 100%; object-fit: cover; }
        .media-container iframe { width: 100%; height: 100%; border: none; }
        
        .info { padding: 12px; text-align: left; background: #fff; position: relative; min-height: 80px; }
        .info h3 { margin: 0; font-size: 0.95rem; color: #001f3f; font-weight: bold; text-transform: uppercase; }
        .info p { margin: 5px 0 0; color: #444; font-size: 0.85rem; line-height: 1.4; padding-right: 50px; }

        /* BOTÃO CURTIR */
        .like-container { position: absolute; right: 10px; bottom: 12px; display: flex; flex-direction: column; align-items: center; cursor: pointer; z-index: 10; }
        .like-btn { font-size: 1.5rem; color: #ccc; transition: transform 0.2s; }
        .like-btn.active { color: #d32f2f; }
        .like-count { font-size: 0.75rem; color: #666; font-weight: bold; }
        
        .swiper-pagination-bullet-active { background: #001f3f !important; }
        .loading { padding: 50px; text-align: center; color: #888; width: 100%; }
    </style>
</head>
<body>

    <div class="header-faixa">Destaques da Semana</div>

    <div class="swiper mySwiper">
        <div class="swiper-wrapper" id="container-radio">
            <div class="loading">Buscando atualizações...</div>
        </div>
        <div class="swiper-pagination"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        // SEU LINK DO APPS SCRIPT ATUALIZADO
        const urlAppScript = "https://script.google.com/macros/s/AKfycbxNzDvifH0pv74i5E7BUS-scdfujI7mRLymYcOmCJDN3JH4AeGAThfHZoGDt2xS228zWw/exec?aba=Respostas ao formulário 1";

        async function curtir(linha, btnElement) {
            const countElement = btnElement.nextElementSibling;
            btnElement.style.transform = "scale(1.3)";
            setTimeout(() => btnElement.style.transform = "scale(1)", 200);
            
            btnElement.classList.add('active');
            btnElement.innerHTML = "❤️";

            try {
                // Remove o parâmetro da aba para o POST, enviando apenas para o script principal
                const urlPost = urlAppScript.split('?')[0];
                await fetch(urlPost, {
                    method: 'POST',
                    mode: 'no-cors', // Necessário para evitar erro de redirecionamento do Google
                    body: JSON.stringify({ linha: linha })
                });
                
                // Incrementa visualmente para dar resposta imediata ao usuário
                let atual = parseInt(countElement.innerText) || 0;
                countElement.innerText = atual + 1;
            } catch (e) { console.error("Erro ao curtir"); }
        }

        async function carregarPosts() {
            const container = document.getElementById('container-radio');
            try {
                const response = await fetch(urlAppScript);
                const dados = await response.json();
                container.innerHTML = '';

                if (!dados || dados.length === 0) {
                    container.innerHTML = '<div class="loading">Nenhum destaque encontrado.</div>';
                    return;
                }

                dados.forEach(item => {
                    const slide = document.createElement('div');
                    slide.className = 'swiper-slide';

                    let linkMidia = item.link || "";
                    let htmlConteudo = "";

                    // LÓGICA DE TRATAMENTO DE IMAGEM DO GOOGLE DRIVE
                    if (linkMidia.includes("drive.google.com")) {
                        const idDoc = linkMidia.match(/[-\w]{25,}/);
                        if (idDoc) {
                            linkMidia = `https://drive.google.com/uc?export=view&id=${idDoc[0]}`;
                        }
                    }

                    if (item.tipo && item.tipo.toLowerCase() === 'video') {
                        htmlConteudo = `<iframe src="${linkMidia}" allow="autoplay"></iframe>`;
                    } else {
                        htmlConteudo = `<img src="${linkMidia}" onerror="this.src='https://raw.githubusercontent.com/claudiaartesdigitais-maker/adm-radio/main/mural.png'">`;
                    }

                    slide.innerHTML = `
                        <div class="media-container">
                            ${htmlConteudo}
                        </div>
                        <div class="info">
                            <h3>${item.apresentador || "Rádio"}</h3>
                            <p>${item.titulo || ""}</p>
                            <div class="like-container" onclick="curtir(${item.id}, this.querySelector('.like-btn'))">
                                <span class="like-btn">🤍</span>
                                <span class="like-count">${item.curtidas || 0}</span>
                            </div>
                        </div>
                    `;
                    container.appendChild(slide);
                });

                // Inicia o Swiper após carregar os dados
                new Swiper(".mySwiper", { 
                    slidesPerView: "auto", 
                    centeredSlides: true, 
                    spaceBetween: 15, 
                    pagination: { el: ".swiper-pagination", clickable: true } 
                });
            } catch (error) { 
                console.error(error);
                container.innerHTML = '<div class="loading">Erro ao carregar destaques.</div>'; 
            }
        }
        
        carregarPosts();
    </script>
</body>
</html>
