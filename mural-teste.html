<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mural de Exibição - Teste</title>
    <style>
        body { font-family: sans-serif; background: #ffffff; margin: 0; padding: 10px; }
        h2 { font-size: 16px; color: #b8860b; border-bottom: 2px solid #eee; padding-bottom: 5px; text-transform: uppercase; }
        .cor-24h { color: #004a99; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-bottom: 30px; }
        .card { background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow: hidden; cursor: pointer; transition: 0.2s; position: relative; border: 1px solid #f0f0f0; }
        .card:hover { transform: scale(1.02); }
        
        .foto { width: 100%; height: 110px; object-fit: cover; display: block; background: #f9f9f9; }
        .info { padding: 8px; }
        .titulo { font-size: 11px; font-weight: bold; color: #333; margin: 0; line-height: 1.2; height: 26px; overflow: hidden; }
        .tipo { font-size: 9px; background: rgba(0,0,0,0.05); padding: 2px 4px; border-radius: 3px; display: inline-block; margin-top: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>✨ Destaques</h2>
    <div id="lista-destaques" class="grid">Carregando destaques...</div>

    <h2 class="cor-24h">📰 Notícias 24 Horas</h2>
    <div id="lista-24h" class="grid">Carregando notícias...</div>

<script>
    // --- CONFIGURAÇÃO DOS LINKS ---
    const LINK_24H = "https://script.google.com/macros/s/AKfycbzvxO4A4LuJPluxrGANlxSWTWHN3ZxU2UgcveW-3wZaIAUS_xLYrCd1LcGbpjMoc6Wa/exec"; 
    const LINK_DESTAQUES = "https://script.google.com/macros/s/AKfycbwY0_wrO28yeXPNqNF0PbAxswS1o6WkOaZzbOjnIJhK0uJAe2aKpbTcYVLoaU8VD9tGBw/exec?aba=Destaques";

    async function carregar(url, containerId) {
        const container = document.getElementById(containerId);
        try {
            const res = await fetch(url);
            const dados = JSON.parse(await res.text());
            container.innerHTML = "";

            if (dados.length === 0) {
                container.innerHTML = "<p style='font-size:12px; color:#999;'>Nenhum item encontrado.</p>";
                return;
            }

            dados.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => window.open(item.link, '_blank');

                card.innerHTML = `
                    <img src="${item.link}" class="foto" onerror="this.src='https://via.placeholder.com/150?text=RADIO'">
                    <div class="info">
                        <p class="titulo">${item.titulo}</p>
                        <span class="tipo">${item.tipo}</span>
                    </div>
                `;
                container.appendChild(card);
            });
        } catch (e) {
            container.innerHTML = "<p style='font-size:12px; color:red;'>Erro ao carregar dados.</p>";
        }
    }

    // Inicia a busca nas duas planilhas
    carregar(LINK_DESTAQUES, "lista-destaques");
    carregar(LINK_24H, "lista-24h");
</script>

</body>
</html>
