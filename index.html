<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        /* AJUSTE: Removi o overflow:hidden e height:480px para o site poder rolar para o segundo carrossel */
        body, html { margin: 0; padding: 0; background: #ffffff; font-family: 'Segoe UI', Roboto, sans-serif; min-height: 100vh; }
        
        /* SEU ESTILO ORIGINAL MANTIDO 100% */
        .mural-titulo { padding: 15px 18px 8px 18px; font-size: 22px; font-weight: 900; color: #001a33; text-transform: uppercase; display: flex; align-items: center; gap: 10px; }
        .mural-titulo::before { content: ''; width: 5px; height: 22px; background: #d32f2f; border-radius: 2px; }
        .feed-container { display: flex; flex-direction: row; overflow-x: auto; padding: 10px 15px 35px 15px; gap: 18px; -webkit-overflow-scrolling: touch; }
        .feed-container::-webkit-scrollbar { display: none; }
        .card { flex: 0 0 300px; background: white; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.12); text-decoration: none; color: #333; height: 400px; display: flex; flex-direction: column; border: 1px solid #eee; overflow: hidden; }
        .thumb-container { width: 100%; height: 200px; background: #000; overflow: hidden; }
        .thumb { width: 100%; height: 100%; object-fit: cover; display: block; }
        .corpo { padding: 15px; flex: 1; display: flex; flex-direction: column; justify-content: flex-start; }
        .tipo { font-size: 12px; color: #d32f2f; font-weight: 900; text-transform: uppercase; margin-bottom: 8px; }
        .titulo { font-size: 18px; font-weight: bold; line-height: 1.4; color: #001a33; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }

        /* ESTILO DO NOVO CARROSSEL DE DESTAQUES (Ajustado para combinar com o seu) */
        .swiper { width: 100%; padding-bottom: 50px !important; }
        .swiper-slide { width: 300px; height: 400px; background: white; border-radius: 20px; overflow: hidden; border: 1px solid #eee; box-shadow: 0 8px 20px rgba(0,0,0,0.12); display: flex; flex-direction: column; }
        .btn-curtir { position: absolute; bottom: 15px; right: 15px; background: rgba(255,255,255,0.9); border: none; border-radius: 20px; padding: 5px 12px; font-weight: bold; color: #d32f2f; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>
    <div class="mural-titulo">Notícias 24 horas</div>
    <div id="lista" class="feed-container"></div>

    <div class="mural-titulo">Destaques da Rádio</div>
    <div class="swiper mySwiper">
        <div class="swiper-wrapper" id="container-destaques">
            </div>
        <div class="swiper-pagination"></div>
    </div>

    <script>
        async function carregar() {
            const url = "https://script.google.com/macros/s/AKfycbzvxO4A4LuJPluxrGANlxSWTWHN3ZxU2UgcveW-3wZaIAUS_xLYrCd1LcGbpjMoc6Wa/exec";
            const imgMuralPadrao = "https://raw.githubusercontent.com/claudiaartesdigitais-maker/adm-radio/main/mural.png?t=" + new Date().getTime();

            try {
                const res = await fetch(url);
                const dados = await res.json(); 
                const container = document.getElementById('lista');
                const agora = new Date().getTime();

                const filtradas = dados.filter(item => {
                    if(!item.data) return false;
                    return (agora - new Date(item.data).getTime()) < 86400000;
                });
                
                if (filtradas.length === 0) {
                    container.innerHTML = "<p style='padding:50px; color:#999; text-align:center; width:100%; font-size:16px;'>Sem novidades nas últimas 24h.</p>";
                } else {
                    container.innerHTML = filtradas.reverse().map(item => {
                        const linkOriginal = (item.link || "").trim();
                        const linkLower = linkOriginal.toLowerCase();
                        const ytMatch = linkOriginal.match(/(?:youtu\.be\/|v\/|u\/\w\/|embed\/|shorts\/|live\/|watch\?v=|\&v=)([^#\&\?]*).*/);
                        const ytId = ytMatch ? ytMatch[1] : null;
                        let imgFinal;
                        
                        if (linkLower.includes("facebook") || linkLower.includes("fb.watch") || linkLower.includes("fb.com") || linkLower.includes("instagram") || linkLower.includes("tiktok") || linkLower.includes("kwai")) {
                            imgFinal = imgMuralPadrao;
                        } else if (ytId) {
                            imgFinal = `https://img.youtube.com/vi/${ytId}/hqdefault.jpg`;
                        } else if (item.capa && item.capa.trim().length > 15 && item.capa.startsWith('http')) {
                            imgFinal = item.capa;
                        } else {
                            imgFinal = imgMuralPadrao;
                        }
                        
                        return `
                            <a href="${linkOriginal}" target="_blank" class="card">
                                <div class="thumb-container">
                                    <img src="${imgFinal}" class="thumb" onerror="this.src='${imgMuralPadrao}'">
                                </div>
                                <div class="corpo">
                                    <span class="tipo">⌚ ${(item.tipo || 'Destaque')}</span>
                                    <div class="titulo">${item.titulo}</div>
                                </div>
                            </a>`;
                    }).join('');
                }
            } catch (e) { console.error(e); }
        }
        carregar();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        async function carregarDestaques() {
            // AQUI VOCÊ COLA A URL DO SCRIPT QUE CRIAMOS HOJE PARA OS DESTAQUES
            const urlDestaques = "COLE_AQUI_O_LINK_DO_APPS_SCRIPT_DE_HOJE"; 
            
            try {
                const res = await fetch(urlDestaques);
                const dados = await res.json();
                const container = document.getElementById('container-destaques');
                
                container.innerHTML = dados.map((item, index) => `
                    <div class="swiper-slide">
                        <div class="thumb-container">
                            ${item.tipo === 'VIDEO' 
                                ? `<video src="${item.link}" class="thumb" muted loop onclick="this.play()"></video>`
                                : `<img src="${item.link}" class="thumb">`
                            }
                        </div>
                        <div class="corpo">
                            <span class="tipo">✨ DESTAQUE</span>
                            <div class="titulo">${item.titulo || ''}</div>
                        </div>
                        <button class="btn-curtir" onclick="curtir(${index})">❤️ <span>${item.curtidas || 0}</span></button>
                    </div>
                `).join('');

                new Swiper(".mySwiper", {
                    slidesPerView: "auto",
                    spaceBetween: 18,
                    pagination: { el: ".swiper-pagination", clickable: true },
                });
            } catch (e) { console.error("Erro nos destaques:", e); }
        }
        carregarDestaques();

        function curtir(index) {
            // Função para enviar curtida (faremos após você testar o visual)
            alert("Em breve: Curtida para o item " + index);
        }
    </script>
</body>
</html>
