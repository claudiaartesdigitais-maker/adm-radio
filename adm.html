<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Rádio - Administrativo</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* Estilo do Menu de Botões */
        .menu-container { width: 100%; max-width: 400px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .btn-portal { 
            display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 20px; border-radius: 12px; border: none; color: white; 
            font-weight: bold; font-size: 16px; cursor: pointer; text-decoration: none;
            transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn-destaques { background: linear-gradient(135deg, #004a99, #003366); }
        .btn-redes { background: linear-gradient(135deg, #d32f2f, #b71c1c); }
        
        .btn-portal:hover { transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }

        /* Estilo do Card do Formulário (Inicia escondido) */
        .card { 
            background: white; padding: 20px; border-radius: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; 
            max-width: 400px; display: none; /* Esconde o formulário inicialmente */
        }

        h2 { color: #004a99; text-align: center; margin-bottom: 20px; font-size: 1.2rem; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; font-size: 14px; }
        input, select, button { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        .btn-enviar { background: #004a99; color: white; border: none; font-weight: bold; cursor: pointer; }
        #mensagem { text-align: center; font-weight: bold; padding: 10px; display: none; }
        
        .voltar { text-align: center; display: block; margin-top: 10px; color: #888; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

    <div class="menu-container" id="menuPrincipal">
        <h2 style="color: #333;">O que deseja fazer?</h2>
        
        <button class="btn-portal btn-destaques" onclick="abrirFormulario()">
            <span>✨</span> Publicar nos Destaques
        </button>

        <a href="https://www.youtube.com" target="_blank" class="btn-portal btn-redes">
            <span>🎬</span> Publicar YouTube / Redes
        </a>
    </div>

    <div class="card" id="cardFormulario">
        <h2>✨ Publicar no Mural</h2>
        
        <label>Link da Notícia/Vídeo</label>
        <input type="text" id="link" placeholder="Cole o link aqui...">

        <label>Título da Notícia</label>
        <input type="text" id="titulo" placeholder="Digite o título...">

        <label>Tipo de Conteúdo</label>
        <select id="tipo">
            <option value="NOTICIA">📰 NOTÍCIA</option>
            <option value="VIDEO">▶ VÍDEO</option>
        </select>

        <button class="btn-enviar" id="btnEnviar" onclick="enviarDados()">PUBLICAR AGORA</button>
        <div id="mensagem"></div>
        
        <a href="#" class="voltar" onclick="fecharFormulario()">← Voltar ao menu</a>
    </div>

<script>
    // Funções para alternar entre Menu e Formulário
    function abrirFormulario() {
        document.getElementById('menuPrincipal').style.display = 'none';
        document.getElementById('cardFormulario').style.display = 'block';
    }

    function fecharFormulario() {
        document.getElementById('menuPrincipal').style.display = 'flex';
        document.getElementById('cardFormulario').style.display = 'none';
    }

    // Sua função original de enviar dados
    async function enviarDados() {
        const btn = document.getElementById('btnEnviar');
        const msg = document.getElementById('mensagem');
        // Mantive o seu link do Script abaixo
        const urlScript = "https://script.google.com/macros/s/AKfycbyhQWzOQlxZwCyM1SA1vlcUorGVw4H2Sk1J2dNs977SKVIYTV6EyPQfpznDt75oEPg/exec"; 

        const payload = {
            link: document.getElementById('link').value,
            titulo: document.getElementById('titulo').value,
            tipo: document.getElementById('tipo').value
        };

        if(!payload.link || !payload.titulo) {
            alert("Preencha todos os campos!");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Enviando...";

        try {
            await fetch(urlScript, {
                method: 'POST',
                mode: 'no-cors', // Adicionado para evitar erro de redirecionamento no POST
                body: JSON.stringify(payload)
            });
            
            msg.style.display = "block";
            msg.style.color = "green";
            msg.innerText = "Sucesso! Publicado no Mural.";
            
            document.getElementById('link').value = "";
            document.getElementById('titulo').value = "";
        } catch (error) {
            msg.style.display = "block";
            msg.style.color = "red";
            msg.innerText = "Erro ao publicar. Tente novamente.";
        } finally {
            btn.disabled = false;
            btn.innerText = "PUBLICAR AGORA";
        }
    }
</script>

</body>
</html>
