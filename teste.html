<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mural da Rádio</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; margin: 0; padding: 15px; }
        h2 { color: #004a99; border-left: 5px solid #004a99; padding-left: 10px; margin-top: 30px; font-size: 20px; text-transform: uppercase; }
        .secao-destaques { color: #b8860b; border-left-color: #b8860b; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.1); position: relative; transition: 0.3s; }
        .card:hover { transform: translateY(-3px); }
        
        .midia { width: 100%; height: 140px; object-fit: cover; display: block; background: #eee; }
        .info { padding: 10px; }
        .titulo { font-size: 13px; font-weight: bold; color: #333; margin: 0; line-height: 1.3; height: 34px; overflow: hidden; }
        
        .badge { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6); color: white; padding: 3px 8px; border-radius: 20px; font-size: 10px; font-weight: bold; }
        .carregando { text-align: center; padding: 20px; color: #666; font-style: italic; }
    </style>
</head>
<body>

    <h2 class="secao-destaques">✨ Destaques da Semana</h2>
    <div id="mural-destaques" class="grid">
        <div class="carregando">Buscando destaques...</div>
    </div>

    <h2>📰 Mural 24 Horas</h2>
    <div id="mural-24h" class="grid">
        <div class="carregando">Carregando notícias...</div>
    </div>

<script>
    // --- LINKS DOS SEUS SCRIPTS ---
    const LINK_NOTICIAS_24H = "https://script.google.com/macros/s/AKfycbzvxO4A4LuJPluxrGANlxSWTWHN3ZxU2UgcveW-3wZaIAUS_xLYrCd1LcGbpjMoc6Wa/exec"; 
    const LINK_DESTAQUES = "https://script.google.com/macros/s/AKfycbwY0_wrO28yeXPNqNF0PbAxswS1o6WkOaZzbOjnIJhK0uJAe2aKpbTcYVLoaU8VD9tGBw/exec?aba=Destaques";

    async function carregarDados(url, containerId) {
        const container = document.getElementById(containerId);
        try {
            const resposta = await fetch(url);
            const dados = JSON.parse(await resposta.text());
            container.innerHTML = ""; // Limpa o "carregando"

            if (dados.length === 0) {
                container.innerHTML = "<p style='padding:10px; color:#999;'>Nenhuma postagem no momento.</p>";
                return;
            }

            dados.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                
                // Verifica se é vídeo ou imagem
                let midiaHtml = "";
                if(item.tipo === "VIDEO") {
                    midiaHtml = `<div style="height:140px; background:#000; display:flex; align-items:center; justify-content:center; color:white; font-size:24px;">▶</div>`;
                } else {
                    midiaHtml = `<img src="${item.link}" class="midia" onerror="this.src='https://via.placeholder.com/150?text=Imagem'">`;
                }

                card.innerHTML = `
                    <span class="badge">${item.tipo}</span>
                    ${midiaHtml}
                    <div class="info">
                        <p class="titulo">${item.titulo}</p>
                    </div>
                `;
                
                // Ao clicar, abre o link (YouTube ou Imagem)
                card.onclick = () => window.open(item.link, '_blank');
                container.appendChild(card);
            });
        } catch (e) {
            container.innerHTML = "<p>Erro ao carregar dados.</p>";
            console.error(e);
        }
    }

    // Inicia a busca para as duas seções
    carregarDados(LINK_DESTAQUES, "mural-destaques");
    carregarDados(LINK_NOTICIAS_24H, "mural-24h");
</script>

</body>
</html>
